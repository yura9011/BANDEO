<header class="px-4 py-3 sticky top-0 z-20" style="background:var(--header-bg); border-bottom:1px solid var(--header-border); backdrop-filter:blur(12px);">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">

        <!-- Logo -->
        <a href="/" class="flex items-center gap-2 hover:opacity-70 transition-opacity shrink-0">
            <img src="/static/logo.jpg" alt="Bandeo" style="height:26px;width:26px;object-fit:cover;border-radius:4px;">
            <span class="text-base font-semibold tracking-tight" style="color:var(--text)">Bandeo</span>
        </a>

        <!-- Nav — oculto en mobile muy chico -->
        <nav class="hidden sm:flex gap-3 text-sm">
            <a href="/"       style="color:{{ 'var(--text)' if active == 'directorio' else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'directorio' }} hover:opacity-100 transition-opacity">Directorio</a>
            <a href="/bandas" style="color:{{ 'var(--text)' if active == 'bandas'     else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'bandas'     }} hover:opacity-100 transition-opacity">Bandas</a>
            <a href="/fechas" style="color:{{ 'var(--text)' if active == 'fechas'     else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'fechas'     }} hover:opacity-100 transition-opacity">Fechas</a>
        </nav>

        <!-- Acciones -->
        <div class="flex items-center gap-3 shrink-0">
            <!-- Temas -->
            <div class="hidden sm:flex items-center gap-1.5">
                <button onclick="setTheme('light')"    title="Claro"     style="width:14px;height:14px;border-radius:50%;background:#F5F4F0;border:2px solid #aaa;cursor:pointer;"></button>
                <button onclick="setTheme('dark')"     title="Oscuro"    style="width:14px;height:14px;border-radius:50%;background:#1a1814;border:2px solid #555;cursor:pointer;"></button>
                <button onclick="setTheme('contrast')" title="Contraste" style="width:14px;height:14px;border-radius:50%;background:#000;border:2px solid #555;cursor:pointer;"></button>
            </div>
            <a href="/create" style="background:var(--btn-bg);color:var(--btn-text)" class="text-xs sm:text-sm px-3 py-1.5 rounded-full font-medium">+ Publicar</a>
        </div>

    </div>

    <!-- Nav mobile — solo en pantallas muy chicas -->
    <div class="sm:hidden flex gap-4 text-xs mt-2 px-1" style="color:var(--muted)">
        <a href="/"       style="color:{{ 'var(--text)' if active == 'directorio' else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'directorio' }}">Directorio</a>
        <a href="/bandas" style="color:{{ 'var(--text)' if active == 'bandas'     else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'bandas'     }}">Bandas</a>
        <a href="/fechas" style="color:{{ 'var(--text)' if active == 'fechas'     else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'fechas'     }}">Fechas</a>
    </div>
</header>
