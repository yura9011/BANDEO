<header class="px-6 py-4 sticky top-0 z-20" style="background:var(--header-bg); border-bottom:1px solid var(--header-border); backdrop-filter:blur(12px);">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-6">
            <a href="/" class="flex items-center gap-2 hover:opacity-70 transition-opacity">
                <img src="/static/logo.jpg" alt="Bandeo" style="height:28px;width:28px;object-fit:cover;border-radius:4px;">
                <span class="text-lg font-semibold tracking-tight" style="color:var(--text)">Bandeo</span>
            </a>
            <nav class="flex gap-4 text-sm">
                <a href="/"       style="color:{{ 'var(--text)' if active == 'directorio' else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'directorio' }} hover:opacity-100 transition-opacity">Directorio</a>
                <a href="/bandas" style="color:{{ 'var(--text)' if active == 'bandas'     else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'bandas'     }} hover:opacity-100 transition-opacity">Bandas</a>
                <a href="/fechas" style="color:{{ 'var(--text)' if active == 'fechas'     else 'var(--muted)' }}" class="{{ 'font-medium' if active == 'fechas'     }} hover:opacity-100 transition-opacity">Fechas</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <button onclick="setTheme('light')"    title="Claro"     style="width:16px;height:16px;border-radius:50%;background:#F5F4F0;border:2px solid #aaa;cursor:pointer;transition:transform 0.15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></button>
                <button onclick="setTheme('dark')"     title="Oscuro"    style="width:16px;height:16px;border-radius:50%;background:#1a1814;border:2px solid #555;cursor:pointer;transition:transform 0.15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></button>
                <button onclick="setTheme('contrast')" title="Contraste" style="width:16px;height:16px;border-radius:50%;background:#000;border:2px solid #555;cursor:pointer;transition:transform 0.15s" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></button>
            </div>
            <a href="/create" style="background:var(--btn-bg);color:var(--btn-text)" class="text-sm px-4 py-2 rounded-full font-medium transition-opacity hover:opacity-85">+ Publicar</a>
        </div>
    </div>
</header>
