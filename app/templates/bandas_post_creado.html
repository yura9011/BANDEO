<!DOCTYPE html>
<html lang="es">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-sm w-full text-center">

        <div class="space-y-3">
            <a href="/bandas" class="block w-full bg-gray-900 hover:bg-gray-700 text-white py-3 rounded-lg text-sm font-medium transition-colors">

            </a>
            <a href="/profile/{{ user.id }}" class="block w-full border border-gray-200 hover:border-gray-900 py-3 rounded-lg text-sm transition-colors">

        </div>
    </div>
