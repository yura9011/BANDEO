<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Bandeo</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>* { font-family: 'DM Sans', sans-serif; }</style>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold tracking-tight mb-8 text-center">Bandeo Admin</h1>

        {% if request.query_params.get('error') %}
        <p class="text-red-500 text-sm text-center mb-4">Credenciales incorrectas.</p>
        {% endif %}

        <form method="post" action="/admin/login" class="space-y-4">
            <input type="text" name="username" placeholder="Usuario" required autofocus
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-gray-900">
            <input type="password" name="password" placeholder="Contrasena" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-gray-900">
            <button type="submit"
                    class="w-full bg-gray-900 hover:bg-gray-700 text-white py-3 rounded-full text-sm font-medium transition-colors">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
