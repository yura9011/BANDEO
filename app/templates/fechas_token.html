<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar fecha — BANDEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'DM Sans', -apple-system, sans-serif; }
        [data-theme="light"]   { --bg:#F5F4F0; --header-bg:rgba(255,255,255,0.85); --header-border:#e5e7eb; --text:#111; --muted:#9ca3af; --btn-bg:#111; --btn-text:#fff; --card-bg:#fff; --card-border:#e5e7eb; }
        [data-theme="dark"]    { --bg:#1a1814; --header-bg:rgba(26,24,20,0.9);     --header-border:#2d2b26; --text:#e8e4dc; --muted:#6b6760; --btn-bg:#e8e4dc; --btn-text:#1a1814; --card-bg:#242018; --card-border:#2d2b26; }
        [data-theme="contrast"]{ --bg:#000;    --header-bg:rgba(0,0,0,0.95);       --header-border:#222;    --text:#fff;    --muted:#555;    --btn-bg:#fff;    --btn-text:#000;    --card-bg:#111; --card-border:#333; }
        body { background:var(--bg); color:var(--text); }
        header { background:var(--header-bg); border-bottom:1px solid var(--header-border); backdrop-filter:blur(12px); }
        .pub-btn { background:var(--btn-bg); color:var(--btn-text); }
        input { background:var(--card-bg); border:1px solid var(--card-border); color:var(--text); }
        input:focus { outline:none; border-color:var(--text); }
        input::placeholder { color:var(--muted); }
    </style>
    <script>
        const t = localStorage.getItem('bandeo_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        function setTheme(t) { document.documentElement.setAttribute('data-theme',t); localStorage.setItem('bandeo_theme',t); }
    </script>
</head>
<body>
    {% set active = "fechas" %}
    {% include "_header.html" %}

    <main class="max-w-md mx-auto px-6 py-20">
        <h1 class="text-2xl font-bold tracking-tight mb-2">Agregar fecha</h1>
        <p class="text-sm mb-10" style="color:var(--muted)">Ingresá tu token de edición para identificarte.</p>

        {% if error %}
        <p class="text-sm text-red-400 mb-6">{{ error }}</p>
        {% endif %}

        <form method="get" action="/fechas/nueva" class="space-y-4">
            <input type="text" name="token" placeholder="Tu token de edición" required
                   class="w-full rounded-lg px-4 py-3 text-sm">
            <button type="submit" class="pub-btn w-full py-3 rounded-full text-sm font-medium">
                Continuar
            </button>
        </form>

        <p class="text-xs mt-6" style="color:var(--muted)">
            ¿No tenés perfil? <a href="/create" class="underline">Creá uno primero</a>.
        </p>
    </main>
</body>
</html>
