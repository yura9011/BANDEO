<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Creado - BANDEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-lg w-full text-center">
        <div class="text-5xl mb-6">✓</div>
        <h2 class="text-3xl font-light mb-3">Perfil creado</h2>
        <p class="text-gray-500 mb-12">Tu perfil ya está visible</p>

        <!-- Link de edición -->
        <div class="bg-gray-50 border border-gray-200 rounded p-6 mb-8 text-left">
            <p class="text-sm text-gray-600 mb-3">Guardá este link para editar tu perfil:</p>
            
            <div class="bg-white border border-gray-200 rounded p-3 mb-4 break-all text-sm font-mono text-gray-700">
                <span id="edit-link">{{ request.url_for('get_edit_profile_form', edit_token=edit_token) }}</span>
            </div>
            
            <button onclick="copyLink()" class="w-full border border-gray-900 hover:bg-gray-900 hover:text-white py-2 rounded transition-colors text-sm">
                Copiar link
            </button>
        </div>

        <!-- Acciones -->
        <div class="space-y-3">
            <a href="/profile/{{ user_id }}" class="block w-full bg-gray-900 hover:bg-gray-800 text-white py-3 rounded transition-colors">
                Ver mi perfil
            </a>
            <a href="/" class="block w-full border border-gray-300 hover:border-gray-900 py-3 rounded transition-colors">
                Volver al inicio
            </a>
        </div>
    </div>

    <script>
        function copyLink() {
            const link = document.getElementById('edit-link').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copiado');
            });
        }
    </script>

</body>
</html>
