<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - BANDEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-screen">
    
    <!-- Header -->
    <header class="border-b border-gray-200 py-6">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-light tracking-wide hover:opacity-70">BANDEO</a>
            <a href="/profile/{{ user.id }}" class="text-sm hover:underline">Ver perfil</a>
        </div>
    </header>

    <div class="container mx-auto px-4 py-12 max-w-xl">
        <h2 class="text-3xl font-light mb-2">Editar perfil</h2>
        <p class="text-gray-500 mb-12">Actualizá tu información</p>

        <form action="/edit/{{ edit_token }}" method="post" class="space-y-6">
            <div>
                <label class="block text-sm text-gray-600 mb-2">Nombre</label>
                <input type="text" name="display_name" required value="{{ user.display_name }}" 
                       class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-2">Ciudad</label>
                <input type="text" name="city" required value="{{ profile.city or '' }}" 
                       class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-2">Instrumentos</label>
                <input type="text" name="instruments" required value="{{ profile.instruments or '' }}" 
                       class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-2">Géneros</label>
                <input type="text" name="genres" required value="{{ profile.genres or '' }}" 
                       class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-2">Bio (opcional)</label>
                <textarea name="bio" rows="3" 
                          class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">{{ profile.bio or '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-2">WhatsApp (opcional)</label>
                <input type="text" name="phone" value="{{ profile.phone or '' }}" 
                       class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-2">Instagram (opcional)</label>
                <input type="text" name="instagram_link" value="{{ profile.instagram_link or '' }}" 
                       class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
            </div>

            <details class="text-sm text-gray-600">
                <summary class="cursor-pointer hover:text-gray-900">Más opciones</summary>
                <div class="mt-4 space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">YouTube</label>
                        <textarea name="youtube_links" rows="2" 
                                  class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">{{ profile.youtube_links or '' }}</textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">Spotify</label>
                        <input type="text" name="spotify_link" value="{{ profile.spotify_link or '' }}" 
                               class="w-full border border-gray-300 rounded px-4 py-3 focus:outline-none focus:border-gray-900">
                    </div>
                </div>
            </details>

            <button type="submit" class="w-full bg-gray-900 hover:bg-gray-800 text-white py-3 rounded transition-colors">
                Guardar cambios
            </button>
        </form>
    </div>

</body>
</html>
