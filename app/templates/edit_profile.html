<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - BANDEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'DM Sans', -apple-system, sans-serif; }
        [data-theme="light"]   { --bg:#F5F4F0; --header-bg:rgba(255,255,255,0.85); --header-border:#e5e7eb; --text:#111; --muted:#9ca3af; --btn-bg:#111; --btn-text:#fff; --card-bg:#fff; --card-border:#e5e7eb; }
        [data-theme="dark"]    { --bg:#1a1814; --header-bg:rgba(26,24,20,0.9);     --header-border:#2d2b26; --text:#e8e4dc; --muted:#6b6760; --btn-bg:#e8e4dc; --btn-text:#1a1814; --card-bg:#242018; --card-border:#2d2b26; }
        [data-theme="contrast"]{ --bg:#000;    --header-bg:rgba(0,0,0,0.95);       --header-border:#222;    --text:#fff;    --muted:#555;    --btn-bg:#fff;    --btn-text:#000;    --card-bg:#111; --card-border:#333; }
        body { background:var(--bg); color:var(--text); transition:background 0.3s,color 0.3s; }
        .field { background:var(--card-bg); border:1px solid var(--card-border); color:var(--text); border-radius:8px; padding:12px 16px; width:100%; font-size:14px; }
        .field:focus { outline:none; border-color:var(--text); }
        .field::placeholder { color:var(--muted); }
        label { font-size:13px; color:var(--muted); display:block; margin-bottom:6px; }
        .submit-btn { background:var(--text); color:var(--bg); }
        .submit-btn:hover { opacity:0.85; }
    </style>
    <script>
        const t = localStorage.getItem('bandeo_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        function setTheme(t) { document.documentElement.setAttribute('data-theme',t); localStorage.setItem('bandeo_theme',t); }
    </script>
</head>
<body>

    {% set active = "directorio" %}
    {% include "_header.html" %}

    <div class="max-w-xl mx-auto px-6 py-14">
        <h2 class="text-2xl sm:text-3xl font-bold tracking-tight mb-2">Editar perfil</h2>
        <p class="text-sm mb-12" style="color:var(--muted)">Actualizá tu información</p>

        <form action="/edit/{{ edit_token }}" method="post" class="space-y-5">
            <div>
                <label>Nombre</label>
                <input type="text" name="display_name" required value="{{ user.display_name }}" class="field">
            </div>

            <div>
                <label>Ciudad</label>
                <input type="text" name="city" required value="{{ profile.city or '' }}" class="field">
            </div>

            <div>
                <label>Instrumentos</label>
                <input type="text" name="instruments" required value="{{ profile.instruments or '' }}" class="field">
            </div>

            <div>
                <label>Géneros</label>
                <input type="text" name="genres" required value="{{ profile.genres or '' }}" class="field">
            </div>

            <div>
                <label>Bio (opcional)</label>
                <textarea name="bio" rows="3" class="field resize-none">{{ profile.bio or '' }}</textarea>
            </div>

            <div>
                <label>Foto de perfil (opcional)</label>
                <input type="text" name="photo_url" value="{{ profile.photo_url or '' }}" placeholder="https://..." class="field">
            </div>

            <div>
                <label>WhatsApp (opcional)</label>
                <input type="text" name="phone" value="{{ profile.phone or '' }}" class="field">
            </div>

            <div>
                <label>Instagram (opcional)</label>
                <input type="text" name="instagram_link" value="{{ profile.instagram_link or '' }}" class="field">
            </div>

            <details class="text-sm" style="color:var(--muted)">
                <summary class="cursor-pointer">Más opciones</summary>
                <div class="mt-4 space-y-4">
                    <div>
                        <label>YouTube</label>
                        <textarea name="youtube_links" rows="2" class="field resize-none">{{ profile.youtube_links or '' }}</textarea>
                    </div>
                    <div>
                        <label>Spotify</label>
                        <input type="text" name="spotify_link" value="{{ profile.spotify_link or '' }}" class="field">
                    </div>
                </div>
            </details>

            <button type="submit" class="submit-btn w-full py-3 rounded-lg text-sm font-medium transition-opacity">
                Guardar cambios
            </button>
        </form>
    </div>

    {% include "_footer.html" %}

</body>
</html>
